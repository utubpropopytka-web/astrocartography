    ctx.stroke();ctx.restore();
  }
  var legend=document.getElementById('mapLegend');legend.innerHTML='';
  for(var i=0;i<pd.length;i++){var el=document.createElement('div');el.className='leg-item';el.innerHTML='<div class="leg-line" style="background:'+pd[i].color+'"></div><span>'+pd[i].name+'</span>';legend.appendChild(el);}
}
function drawPlanets(pd){
  var list=document.getElementById('planetList');list.innerHTML='';
  for(var i=0;i<pd.length;i++){
    var p=pd[i];var meaning=p.meanings[p.zone]||p.desc;var citiesHtml='';
    for(var c=0;c<Math.min(8,p.cities.length);c++){citiesHtml+='<div class="city-chip">'+p.cities[c]+'</div>';}
    var card=document.createElement('div');card.className='planet-card';
    card.innerHTML='<div class="planet-header" onclick="toggleCard(this)"><div class="planet-dot" style="background:'+p.color+'"></div><div class="planet-name-text">'+p.name+'</div><div class="zone-badge" style="background:'+p.color+'15;color:'+p.color+';border:1px solid '+p.color+'30">'+p.zone+'</div><span class="chevron">▾</span></div><div class="planet-body"><p class="planet-desc-text">'+p.desc+'</p><div class="meaning-box" style="border-color:'+p.color+'40;">'+meaning+'</div><div class="cities-label">Города на линии '+p.name+'</div><div class="cities-grid">'+citiesHtml+'</div></div>';
    list.appendChild(card);
  }
}
function toggleCard(header){var body=header.nextElementSibling;var chevron=header.querySelector('.chevron');var isOpen=body.classList.contains('open');body.classList.toggle('open',!isOpen);chevron.style.transform=isOpen?'':'rotate(180deg)';}
function drawTop(){
  var scored=[];
  for(var i=0;i<WORLD_CITIES.length;i++){
    var c=WORLD_CITIES[i];var score=60;var bestTags=[];var bestColors=[];
    for(var p=0;p<currentPlanetData.length;p++){var pd=currentPlanetData[p];
      var mcLngDiff=Math.abs(normLng(c.lng-pd.mcLng));var acLngDiff=Math.abs(normLng(c.lng-pd.acLng));
      if(mcLngDiff<15){score+=Math.round((15-mcLngDiff)*2);bestTags.push(pd.name+' MC');bestColors.push(pd.color);}
      if(acLngDiff<15){score+=Math.round((15-acLngDiff)*2);bestTags.push(pd.name+' AC');bestColors.push(pd.color);}}
    score+=Math.floor(Math.sin(c.lat*0.3+c.lng*0.17)*8+8);
    scored.push({city:c.city,country:c.country,tags:bestTags.slice(0,2),colors:bestColors.slice(0,2),score:Math.min(99,score)});}
  scored.sort(function(a,b){return b.score-a.score;});var top10=scored.slice(0,10);currentTopCities=top10;
  var list=document.getElementById('topList');list.innerHTML='';
  for(var i=0;i<top10.length;i++){
    var c=top10[i];var numClass=i===0?'n1':i===1?'n2':i===2?'n3':'';var tagsHtml='';
    if(c.tags.length===0){c.tags=['Общая энергия'];c.colors=['#9090a0'];}
    for(var t=0;t<c.tags.length;t++){tagsHtml+='<span class="top-tag" style="background:'+c.colors[t]+'15;color:'+c.colors[t]+';border:1px solid '+c.colors[t]+'30">'+c.tags[t]+'</span>';}
    var item=document.createElement('div');item.className='top-item';
    item.innerHTML='<div class="top-num '+numClass+'">'+(i+1)+'</div><div class="top-info"><div class="top-city-name">'+c.city+'</div><div class="top-country-name">'+c.country+'</div><div class="top-tags">'+tagsHtml+'</div></div><div class="top-score">'+c.score+'</div>';
    list.appendChild(item);}
}
function resetForm(){document.getElementById('formCard').style.display='block';document.getElementById('result').classList.remove('show');document.getElementById('citySearch').value='';document.getElementById('birthCity').value='';selectedCityName='';}
</script>
